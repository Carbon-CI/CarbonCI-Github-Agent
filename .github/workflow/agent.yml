name: Carbon CI
description: Monitor GitHub Actions job carbon emissions automatically
author: Carbon-CI

branding:
  icon: activity
  color: green

inputs:
  api-key:
    description: Carbon CI API key (store it as a secret)
    required: true

runs:
  using: composite

  # Runs before the job's steps
  pre-if: always()
  pre: |
    echo "Starting Carbon CI monitoring..."
    if ! command -v carbon-ci >/dev/null 2>&1; then
      echo "Installing Carbon CI agent..."
      curl -sSL https://carbon-ci.fr/install.sh | bash
    fi
    carbon-ci start \
      --api-key "${{ inputs.api-key }}" \
      --project "${{ github.repository }}" \
      --pipeline "${{ github.run_id }}" \
      --job "${{ github.job }}"

  # Runs after the job's steps (always, even on failure)
  post-if: always()
  post: |
    echo "Stopping Carbon CI monitoring..."
    carbon-ci stop

  steps: []
